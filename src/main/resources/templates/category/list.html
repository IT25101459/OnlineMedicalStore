<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Categories - MediStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Categories</h3>
        <div>
            <a href="/category/add" class="btn btn-success btn-sm">+ Add Category</a>
            <a href="/" class="btn btn-secondary btn-sm ms-2">Home</a>
        </div>
    </div>
    <table class="table table-bordered table-hover">
        <thead class="table-success">
        <tr><th>Name</th><th>Description</th><th>Actions</th></tr>
        </thead>
        <tbody>
        <tr th:each="cat : ${categories}">
            <td th:text="${cat.name}"></td>
            <td th:text="${cat.description}"></td>
            <td>
                <a th:href="@{/category/edit/{id}(id=${cat.categoryId})}" class="btn btn-warning btn-sm">Edit</a>
                <form th:action="@{/category/delete/{id}(id=${cat.categoryId})}" method="post" class="d-inline"
                      onsubmit="return confirm('Delete this category?')">
                    <button class="btn btn-danger btn-sm">Delete</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(categories)}">
            <td colspan="3" class="text-center text-muted">No categories found.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
