<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Category</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width:450px">
    <div class="card shadow">
        <div class="card-body p-4">
            <h3>Edit Category</h3>
            <form th:action="@{/category/edit}" method="post">
                <input type="hidden" name="categoryId" th:value="${category.categoryId}">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="form-control" th:value="${category.name}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="2" required th:text="${category.description}"></textarea>
                </div>
                <button type="submit" class="btn btn-warning">Save</button>
                <a href="/category" class="btn btn-secondary ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
