<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Medicine - MediStore</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar('medicine')}"></div>
<main class="main-content">
    <div class="page-header">
        <div><h1>Add Medicine</h1><p>Register a new medicine in the system</p></div>
        <a href="/medicine" class="btn btn-secondary">← Back</a>
    </div>
    <div class="card" style="max-width:580px">
        <form th:action="@{/medicine/add}" method="post">
            <div class="form-group">
                <label class="form-label">Medicine Name</label>
                <input type="text" name="name" class="form-control" placeholder="e.g. Paracetamol 500mg" required>
            </div>
            <div class="form-group">
                <label class="form-label">Category</label>
                <select name="categoryId" class="form-control" required>
                    <option value="">-- Select Category --</option>
                    <option th:each="cat : ${categories}" th:value="${cat.categoryId}" th:text="${cat.name}"></option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Supplier</label>
                <select name="supplierId" class="form-control" required>
                    <option value="">-- Select Supplier --</option>
                    <option th:each="sup : ${suppliers}" th:value="${sup.supplierId}" th:text="${sup.name}"></option>
                </select>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                <div class="form-group">
                    <label class="form-label">Price (Rs.)</label>
                    <input type="number" name="price" class="form-control" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Stock</label>
                    <input type="number" name="stock" class="form-control" min="0" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="2" required></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Expiry Date</label>
                <input type="date" name="expiryDate" class="form-control" required>
            </div>
            <div class="d-flex gap-2 mt-3">
                <button type="submit" class="btn btn-success">Add Medicine</button>
                <a href="/medicine" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
