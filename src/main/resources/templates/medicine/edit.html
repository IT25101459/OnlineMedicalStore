<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Medicine - MediStore</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar('medicine')}"></div>
<main class="main-content">
    <div class="page-header">
        <div><h1>Edit Medicine</h1><p>Update medicine details</p></div>
        <a href="/medicine" class="btn btn-secondary">← Back</a>
    </div>
    <div class="card" style="max-width:580px">
        <form th:action="@{/medicine/edit}" method="post">
            <input type="hidden" name="medicineId" th:value="${medicine.medicineId}">
            <div class="form-group">
                <label class="form-label">Medicine Name</label>
                <input type="text" name="name" class="form-control" th:value="${medicine.name}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Category</label>
                <select name="categoryId" class="form-control">
                    <option th:each="cat : ${categories}" th:value="${cat.categoryId}" th:text="${cat.name}"
                            th:selected="${cat.categoryId == medicine.categoryId}"></option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Supplier</label>
                <select name="supplierId" class="form-control">
                    <option th:each="sup : ${suppliers}" th:value="${sup.supplierId}" th:text="${sup.name}"
                            th:selected="${sup.supplierId == medicine.supplierId}"></option>
                </select>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                <div class="form-group">
                    <label class="form-label">Price (Rs.)</label>
                    <input type="number" name="price" class="form-control" th:value="${medicine.price}" step="0.01" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Stock</label>
                    <input type="number" name="stock" class="form-control" th:value="${medicine.stock}" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="2" required th:text="${medicine.description}"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Expiry Date</label>
                <input type="date" name="expiryDate" class="form-control" th:value="${medicine.expiryDate}" required>
            </div>
            <div class="d-flex gap-2 mt-3">
                <button type="submit" class="btn btn-warning">Save Changes</button>
                <a href="/medicine" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
