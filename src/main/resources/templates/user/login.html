<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - MediStore</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="margin-left:0">
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Welcome Back 👋</h2>
        <p class="subtitle">Sign in to your MediStore account</p>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${param.success}" class="alert alert-success">Account created! Please login.</div>
        <div th:if="${param.deleted}" class="alert alert-info">Account successfully deleted.</div>
        <form th:action="@{/user/login}" method="post">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-2" style="justify-content:center;">Sign In</button>
        </form>
        <p class="text-muted mt-3" style="text-align:center;font-size:0.87rem;">
            Don't have an account? <a href="/user/register" style="color:#6366f1;font-weight:600;">Register</a>
        </p>
    </div>
</div>
</body>
</html>
