<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - MediStore</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="margin-left:0">
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Create Account 💊</h2>
        <p class="subtitle">Join MediStore to manage your medicines</p>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <form th:action="@{/user/register}" method="post">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control" placeholder="07X XXXXXXX" required>
            </div>
            <div class="form-group">
                <label class="form-label">Address</label>
                <textarea name="address" class="form-control" rows="2" placeholder="Your address" required></textarea>
            </div>
            <button type="submit" class="btn btn-success w-100 mt-2" style="justify-content:center;">Create Account</button>
        </form>
        <p class="text-muted mt-3" style="text-align:center;font-size:0.87rem;">
            Already have an account? <a href="/user/login" style="color:#6366f1;font-weight:600;">Login</a>
        </p>
    </div>
</div>
</body>
</html>
