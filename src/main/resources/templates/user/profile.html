<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile - MediStore</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar('profile')}"></div>
<main class="main-content">
    <div class="page-header">
        <div><h1>My Profile</h1><p>Manage your account details</p></div>
        <div class="d-flex gap-2">
            <a href="/user/edit" class="btn btn-warning">✏️ Edit Profile</a>
            <form th:action="@{/user/delete}" method="post"
                  onsubmit="return confirm('Delete your account? This cannot be undone.')">
                <button type="submit" class="btn btn-danger">🗑 Delete Account</button>
            </form>
        </div>
    </div>
    <div th:if="${param.updated}" class="alert alert-success">Profile updated successfully!</div>
    <div class="card" style="max-width:600px">
        <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px;">
            <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:white;">
                👤
            </div>
            <div>
                <h2 style="font-size:1.3rem;font-weight:700;" th:text="${user.username}"></h2>
                <span class="badge badge-purple" th:text="${user.role}"></span>
            </div>
        </div>
        <div style="display:grid;gap:14px;">
            <div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f1f5f9;">
                <span class="text-muted">Email</span><span class="fw-bold" th:text="${user.email}"></span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f1f5f9;">
                <span class="text-muted">Phone</span><span class="fw-bold" th:text="${user.phone}"></span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:12px 0;">
                <span class="text-muted">Address</span><span class="fw-bold" th:text="${user.address}"></span>
            </div>
        </div>
    </div>
</main>
</body>
</html>
