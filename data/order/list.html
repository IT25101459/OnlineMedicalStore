<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Orders - MediStore</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar('order')}"></div>
<main class="main-content">
    <div class="page-header">
        <div><h1>Order Management</h1><p>Track and manage all your orders</p></div>
    </div>
    <div th:if="${param.placed}" class="alert alert-success">✅ Order placed successfully!</div>

    <div class="stat-grid">
        <div class="stat-card grad-blue">
            <p>Total Orders</p>
            <h2 th:text="${orders.size()}">0</h2>
        </div>
        <div class="stat-card grad-orange">
            <p>Pending</p>
            <h2 th:text="${pendingCount}">0</h2>
        </div>
        <div class="stat-card grad-teal">
            <p>Delivered</p>
            <h2 th:text="${deliveredCount}">0</h2>
        </div>
    </div>

    <div class="card">
        <table class="data-table">
            <thead>
                <tr><th>Order ID</th><th>Medicine</th><th>Qty</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orders}">
                    <td><span class="badge badge-blue" th:text="${order.orderId}"></span></td>
                    <td><strong th:text="${order.medicineName}"></strong></td>
                    <td th:text="${order.quantity}"></td>
                    <td><strong th:text="'Rs. ' + ${order.totalAmount}"></strong></td>
                    <td>
                        <span th:if="${order.status == 'pending'}"   class="badge badge-yellow">Pending</span>
                        <span th:if="${order.status == 'confirmed'}" class="badge badge-blue">Confirmed</span>
                        <span th:if="${order.status == 'delivered'}" class="badge badge-green">Delivered</span>
                        <span th:if="${order.status == 'cancelled'}" class="badge badge-red">Cancelled</span>
                    </td>
                    <td th:text="${order.orderDate}"></td>
                    <td>
                        <div class="action-btns">
                            <a th:href="@{/payment/add(orderId=${order.orderId}, amount=${order.totalAmount})}"
                               class="btn btn-success btn-sm">💳 Pay</a>
                            <form th:action="@{/order/delete/{id}(id=${order.orderId})}" method="post"
                                  onsubmit="return confirm('Cancel this order?')">
                                <button class="btn btn-danger btn-sm">Cancel</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(orders)}">
                    <td colspan="7">
                        <div class="empty-state"><div class="icon">📦</div><p>No orders yet.</p></div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
